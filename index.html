<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#090909,#1d1d1d,#111);
    font-family:Georgia, "Times New Roman", serif;
    color:#f2f2f2;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,rgba(255,255,255,.05),transparent 70%);
    animation:float 10s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translate(-100px,-60px);}
    50%{transform:translate(120px,80px);}
}

.container{
    width:90%;
    max-width:850px;
    padding:60px;
    text-align:center;
    backdrop-filter:blur(8px);
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    box-shadow:0 0 50px rgba(0,0,0,.5);
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:52px;
    font-weight:300;
    letter-spacing:3px;
    margin-bottom:15px;
}

.subtitle{
    color:#cfcfcf;
    font-size:20px;
    margin-bottom:45px;
}

.quote{
    font-size:26px;
    line-height:1.8;
    color:#f5f5f5;
    font-style:italic;
    margin-bottom:45px;
}

.status{
    display:inline-block;
    padding:14px 28px;
    border:1px solid rgba(255,255,255,.2);
    border-radius:50px;
    font-size:22px;
    letter-spacing:2px;
    margin-bottom:40px;
}

.message{
    color:#d6d6d6;
    font-size:19px;
    line-height:2;
}

footer{
    margin-top:50px;
    color:#888;
    font-size:15px;
    letter-spacing:1px;
}

hr{
    margin:40px auto;
    width:60%;
    border:none;
    border-top:1px solid rgba(255,255,255,.1);
}

@media(max-width:700px){

.container{
    padding:35px 25px;
}

h1{
    font-size:38px;
}

.quote{
    font-size:21px;
}

.status{
    font-size:18px;
}

.message{
    font-size:17px;
}

}
</style>

</head>
<body>

<div class="container">

<h1>Goodbye.</h1>

<div class="subtitle">
This page remains, but the story has reached its final chapter.
</div>

<div class="quote">
"This website remains as a reminder that not every beautiful beginning has a happy ending.<br><br>

Not every love story gets a forever,
but every story leaves a memory."
</div>

<div class="status">
❤ Relationship Status: Offline
</div>

<hr>

No further updates are planned.
</div>
</div>

</body>
</html>
